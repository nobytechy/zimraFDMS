# Netlify build config for zimFDMS
# Env vars (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) live under
# Site settings → Environment variables — never commit them here.

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# SPA — every unknown path serves index.html so React Router can handle it
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
